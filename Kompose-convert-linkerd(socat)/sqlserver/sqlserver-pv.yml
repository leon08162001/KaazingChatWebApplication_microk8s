apiVersion: v1
kind: PersistentVolume
metadata:
  name: mssql-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: microk8s-hostpath
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /shared/volumes/mssql/data
    type: DirectoryOrCreate

---

